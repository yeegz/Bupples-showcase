<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 716" width="340" height="716" font-family="'DM Sans','Segoe UI',sans-serif" role="img" aria-label="Bupples settle-up plan — three friends pay you back, warm-paper theme.">
  <defs>
    <linearGradient id="s3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FCF9F2"/><stop offset="1" stop-color="#F2EBDD"/></linearGradient>
    <filter id="sf3" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0D1C14" flood-opacity="0.20"/></filter>
  </defs>
  <rect x="10" y="8" width="320" height="700" rx="48" fill="#F2EBDD" stroke="#E1D7C8" stroke-width="1.5" filter="url(#sf3)"/>
  <rect x="22" y="20" width="296" height="676" rx="38" fill="url(#s3)"/>

  <rect x="150" y="40" width="40" height="5" rx="2.5" fill="#D8CDBB"/>
  <text x="40" y="80" font-size="20" font-weight="700" font-family="Georgia,serif" fill="#263128">Settle up</text>
  <rect x="232" y="62" width="66" height="28" rx="14" fill="#FFFCF6" stroke="#D8CDBB" stroke-width="1"/>
  <text x="265" y="80" font-size="12" font-weight="600" fill="#626C61" text-anchor="middle">Logs</text>
  <text x="40" y="102" font-size="13" fill="#626C61">Three payments clear everyone.</text>

  <text x="40" y="138" font-size="10.5" font-weight="700" fill="#6F756B" letter-spacing="1">THE PLAN</text>

  <!-- row: Steven pays you -->
  <rect x="40" y="150" width="258" height="62" rx="18" fill="#F1E9DC" stroke="#2F7D55" stroke-opacity="0.3" stroke-width="1.2"/>
  <circle cx="74" cy="181" r="19" fill="#8B6F3E"/><text x="74" y="186" font-size="14" font-weight="700" fill="#FFFCF6" text-anchor="middle">St</text>
  <text x="104" y="177" font-size="14.5" font-weight="700" fill="#263128">Steven pays you</text>
  <text x="104" y="194" font-size="11" fill="#6F756B">they’ll mark it paid</text>
  <text x="282" y="188" font-size="16" font-weight="800" fill="#2F7D55" text-anchor="end">RM25.00</text>

  <!-- row: Steph pays you -->
  <rect x="40" y="222" width="258" height="62" rx="18" fill="#F1E9DC" stroke="#2F7D55" stroke-opacity="0.3" stroke-width="1.2"/>
  <circle cx="74" cy="253" r="19" fill="#3F6D73"/><text x="74" y="258" font-size="14" font-weight="700" fill="#FFFCF6" text-anchor="middle">Se</text>
  <text x="104" y="249" font-size="14.5" font-weight="700" fill="#263128">Steph pays you</text>
  <text x="104" y="266" font-size="11" fill="#6F756B">they’ll mark it paid</text>
  <text x="282" y="260" font-size="16" font-weight="800" fill="#2F7D55" text-anchor="end">RM25.00</text>

  <!-- row: Justin pays you -->
  <rect x="40" y="294" width="258" height="62" rx="18" fill="#F1E9DC" stroke="#2F7D55" stroke-opacity="0.3" stroke-width="1.2"/>
  <circle cx="74" cy="325" r="19" fill="#6F7A3D"/><text x="74" y="330" font-size="14" font-weight="700" fill="#FFFCF6" text-anchor="middle">Ju</text>
  <text x="104" y="321" font-size="14.5" font-weight="700" fill="#263128">Justin pays you</text>
  <text x="104" y="338" font-size="11" fill="#6F756B">they’ll mark it paid</text>
  <text x="282" y="332" font-size="16" font-weight="800" fill="#2F7D55" text-anchor="end">RM25.00</text>

  <!-- confirm card (incoming) -->
  <rect x="40" y="384" width="258" height="118" rx="20" fill="#EAF3EC" stroke="#2F7D55" stroke-opacity="0.4" stroke-width="1.3"/>
  <circle cx="70" cy="416" r="17" fill="#3F6D73"/><text x="70" y="421" font-size="13" font-weight="700" fill="#FFFCF6" text-anchor="middle">Se</text>
  <text x="98" y="421" font-size="13.5" font-weight="600" fill="#263128">Steph says they paid you</text>
  <rect x="56" y="444" width="106" height="40" rx="13" fill="#FFFCF6" stroke="#D8CDBB" stroke-width="1.1"/>
  <text x="109" y="469" font-size="13" font-weight="600" fill="#626C61" text-anchor="middle">Not yet</text>
  <rect x="174" y="444" width="110" height="40" rx="13" fill="#2F7D55"/>
  <text x="229" y="469" font-size="12.5" font-weight="700" fill="#FFFCF6" text-anchor="middle">Confirm RM25</text>
</svg>
