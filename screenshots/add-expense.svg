<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 716" width="340" height="716" font-family="'DM Sans','Segoe UI',sans-serif" role="img" aria-label="Bupples add-expense sheet — RM100 dinner split four ways, warm-paper theme.">
  <defs>
    <linearGradient id="s2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FCF9F2"/><stop offset="1" stop-color="#F2EBDD"/></linearGradient>
    <filter id="sf2" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0D1C14" flood-opacity="0.20"/></filter>
  </defs>
  <rect x="10" y="8" width="320" height="700" rx="48" fill="#F2EBDD" stroke="#E1D7C8" stroke-width="1.5" filter="url(#sf2)"/>
  <rect x="22" y="20" width="296" height="676" rx="38" fill="url(#s2)"/>

  <rect x="150" y="40" width="40" height="5" rx="2.5" fill="#D8CDBB"/>
  <text x="40" y="78" font-size="19" font-weight="700" font-family="Georgia,serif" fill="#263128">Add expense</text>

  <!-- amount card -->
  <rect x="40" y="96" width="258" height="120" rx="20" fill="#FFFCF6" stroke="#D8CDBB" stroke-width="1.2"/>
  <text x="56" y="124" font-size="10.5" font-weight="700" fill="#6F756B" letter-spacing="1">AMOUNT</text>
  <text x="56" y="170" font-size="38" font-weight="800" font-family="Georgia,serif" fill="#2F6F4E" letter-spacing="-1">RM100.00</text>
  <line x1="56" y1="186" x2="282" y2="186" stroke="#E1D7C8" stroke-width="1"/>
  <text x="56" y="205" font-size="13.5" fill="#263128" font-weight="600">Dinner</text>

  <!-- categories -->
  <rect x="40" y="232" width="78" height="34" rx="12" fill="#E4EFE5" stroke="#2F6F4E" stroke-width="1.4"/>
  <text x="79" y="254" font-size="12.5" font-weight="600" fill="#2F6F4E" text-anchor="middle">🍕 Food</text>
  <rect x="126" y="232" width="80" height="34" rx="12" fill="#F1E9DC" stroke="#D8CDBB" stroke-width="1"/>
  <text x="166" y="254" font-size="12.5" font-weight="600" fill="#626C61" text-anchor="middle">🍻 Drinks</text>
  <rect x="214" y="232" width="84" height="34" rx="12" fill="#F1E9DC" stroke="#D8CDBB" stroke-width="1"/>
  <text x="256" y="254" font-size="12.5" font-weight="600" fill="#626C61" text-anchor="middle">🚕 Ride</text>

  <!-- who paid -->
  <text x="40" y="298" font-size="10.5" font-weight="700" fill="#6F756B" letter-spacing="1">WHO PAID</text>
  <rect x="40" y="308" width="64" height="34" rx="12" fill="#2F6F4E"/>
  <text x="72" y="330" font-size="12.5" font-weight="700" fill="#FFFCF6" text-anchor="middle">You</text>
  <rect x="112" y="308" width="74" height="34" rx="12" fill="#F1E9DC" stroke="#D8CDBB" stroke-width="1"/>
  <text x="149" y="330" font-size="12.5" font-weight="600" fill="#626C61" text-anchor="middle">Steven</text>

  <!-- split summary -->
  <rect x="40" y="360" width="258" height="64" rx="18" fill="#FFFCF6" stroke="#D8CDBB" stroke-width="1.2"/>
  <text x="56" y="388" font-size="14" font-weight="600" fill="#263128">Split equally</text>
  <text x="56" y="408" font-size="12" fill="#6F756B">RM25.00 each · 4 people</text>
  <text x="282" y="396" font-size="13" font-weight="600" fill="#2F6F4E" text-anchor="end">Change</text>

  <!-- more options -->
  <rect x="40" y="436" width="258" height="46" rx="14" fill="#F1E9DC" stroke="#D8CDBB" stroke-width="1"/>
  <text x="58" y="463" font-size="13" font-weight="600" fill="#263128">More options</text>
  <text x="282" y="463" font-size="13" fill="#6F756B" text-anchor="end">tax, receipt, note ⌄</text>

  <!-- CTA -->
  <rect x="40" y="612" width="258" height="52" rx="16" fill="#2F6F4E"/>
  <text x="169" y="644" font-size="15" font-weight="700" fill="#FFFCF6" text-anchor="middle">Add expense</text>
</svg>
