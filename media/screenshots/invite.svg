<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 716" width="340" height="716" font-family="'DM Sans','Segoe UI',sans-serif" role="img" aria-label="Bupples invite screen — a QR code and join code, warm-paper theme.">
  <defs>
    <linearGradient id="s4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FCF9F2"/><stop offset="1" stop-color="#F2EBDD"/></linearGradient>
    <filter id="sf4" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0D1C14" flood-opacity="0.20"/></filter>
  </defs>
  <rect x="10" y="8" width="320" height="700" rx="48" fill="#F2EBDD" stroke="#E1D7C8" stroke-width="1.5" filter="url(#sf4)"/>
  <rect x="22" y="20" width="296" height="676" rx="38" fill="url(#s4)"/>

  <rect x="150" y="40" width="40" height="5" rx="2.5" fill="#D8CDBB"/>
  <text x="170" y="86" font-size="20" font-weight="700" font-family="Georgia,serif" fill="#263128" text-anchor="middle">Invite to Melaka</text>
  <text x="170" y="108" font-size="13" fill="#626C61" text-anchor="middle">Scan to join, or share the code.</text>

  <!-- QR card -->
  <rect x="80" y="138" width="180" height="180" rx="24" fill="#FFFCF6" stroke="#D8CDBB" stroke-width="1.2"/>
  <g fill="#2F6F4E">
    <!-- finder patterns -->
    <rect x="100" y="158" width="34" height="34" rx="6" fill="none" stroke="#2F6F4E" stroke-width="7"/>
    <rect x="111" y="169" width="12" height="12" rx="2"/>
    <rect x="206" y="158" width="34" height="34" rx="6" fill="none" stroke="#2F6F4E" stroke-width="7"/>
    <rect x="217" y="169" width="12" height="12" rx="2"/>
    <rect x="100" y="264" width="34" height="34" rx="6" fill="none" stroke="#2F6F4E" stroke-width="7"/>
    <rect x="111" y="275" width="12" height="12" rx="2"/>
    <!-- modules -->
    <rect x="150" y="158" width="9" height="9"/><rect x="168" y="158" width="9" height="9"/><rect x="186" y="158" width="9" height="9"/>
    <rect x="150" y="176" width="9" height="9"/><rect x="186" y="176" width="9" height="9"/>
    <rect x="150" y="194" width="9" height="9"/><rect x="168" y="194" width="9" height="9"/>
    <rect x="100" y="212" width="9" height="9"/><rect x="118" y="212" width="9" height="9"/><rect x="150" y="212" width="9" height="9"/><rect x="186" y="212" width="9" height="9"/><rect x="222" y="212" width="9" height="9"/>
    <rect x="108" y="230" width="9" height="9"/><rect x="150" y="230" width="9" height="9"/><rect x="168" y="230" width="9" height="9"/><rect x="204" y="230" width="9" height="9"/><rect x="222" y="230" width="9" height="9"/>
    <rect x="150" y="248" width="9" height="9"/><rect x="186" y="248" width="9" height="9"/><rect x="222" y="248" width="9" height="9"/>
    <rect x="150" y="266" width="9" height="9"/><rect x="168" y="266" width="9" height="9"/><rect x="204" y="266" width="9" height="9"/>
    <rect x="150" y="284" width="9" height="9"/><rect x="186" y="284" width="9" height="9"/><rect x="222" y="284" width="9" height="9"/>
  </g>
  <!-- Pip in QR center -->
  <circle cx="170" cy="228" r="17" fill="#FFFCF6"/>
  <g stroke="#2F6F4E" stroke-width="2.5" fill="none"><circle cx="165" cy="226" r="7"/><circle cx="175" cy="228" r="7"/></g>
  <circle cx="168" cy="228" r="1.6" fill="#2F6F4E"/><circle cx="172" cy="228" r="1.6" fill="#2F6F4E"/>

  <!-- code -->
  <text x="170" y="384" font-size="11" font-weight="700" fill="#6F756B" letter-spacing="1.5" text-anchor="middle">JOIN CODE</text>
  <text x="170" y="430" font-size="40" font-weight="800" font-family="Georgia,serif" fill="#2F6F4E" letter-spacing="8" text-anchor="middle">4QK2ZP</text>

  <!-- share button -->
  <rect x="50" y="470" width="240" height="52" rx="16" fill="#2F6F4E"/>
  <text x="170" y="502" font-size="15" font-weight="700" fill="#FFFCF6" text-anchor="middle">Share invite link</text>
  <rect x="50" y="534" width="240" height="48" rx="14" fill="#FFFCF6" stroke="#D8CDBB" stroke-width="1.2"/>
  <text x="170" y="563" font-size="13.5" font-weight="600" fill="#626C61" text-anchor="middle">Copy code</text>

  <rect x="140" y="676" width="60" height="5" rx="2.5" fill="#D8CDBB"/>
</svg>
